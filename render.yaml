services:
  # ── Web Service ──────────────────────────────────────────
  - type: web
    name: eventhub-pro-web
    runtime: node
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: eventhub-pro-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: eventhub-pro-redis
          type: keyvalue
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: TICKET_SIGNING_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

  # ── Worker Service (background jobs) ─────────────────────
  - type: worker
    name: eventhub-pro-worker
    runtime: node
    plan: free
    buildCommand: npm ci && npx prisma generate
    startCommand: node scripts/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: eventhub-pro-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: eventhub-pro-redis
          type: keyvalue
          property: connectionString

  # ── Redis (Key-Value Store) ──────────────────────────────
  - type: keyvalue
    name: eventhub-pro-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # Required for free tier or restricted access

databases:
  - name: eventhub-pro-db
    plan: free
    databaseName: eventhub_pro
    user: eventhub
